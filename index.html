<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecommerce Clothing Home</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<header class="header">

<div class="header-left">
<span class="hora">9:41</span>
<span class="header-saludo">Hello, Welcome 👋</span>
<h1 class="header-name">Johlver Pardo</h1>
</div>

<div class="header-right">
<span class="swb">
<img src="storage/img/Mobile Signal.png">
<img src="storage/img/Wifi.png">
<img src="storage/img/Battery.png">
</span>

<div class="header-avatar">
<a href="views/profile.html">
  <img src="storage/img/avatar.jpg">
</a>
</div>
</div>

</header>


<nav class="nav">

<div class="search">
<img src="storage/img/BusquedaIcon.png" class="imgsearch">
<input class="busqueda" type="text" placeholder="Search clothes...">
</div>

<div class="settings">
<img src="storage/img/SettingsIcon.png" class="settingIcon">
</div>

</nav>


<section class="Items">

<div class="all">
<img src="storage/img/Default Icon.png">
<span>All Items</span>
</div>

<div class="dress">
<img src="storage/img/VestidoIcon.png">
<span>Dress</span>
</div>

<div class="tshirt">
<img src="storage/img/CamisaIcon.png">
<span>T-Shirt</span>
</div>

<div class="pants">
<img src="storage/img/JeansIcon.png">
<span>Pants</span>
</div>

</section>


<section class="Imagenes">

  <div class="product img1">
    <div class="product-image">
      <a href="views/detail.html">
      <img src="storage/img/Library=Product1.png" alt="Ropa1">
      </a>
      <span class="fav">
        <img src="storage/img/heart.png" alt="favorito">
      </span>
    </div>

    <h3>Modern Light Clothes</h3>
    <p class="category">T-Shirt</p>

    <div class="product-bottom">
      <span class="price">$212.99</span>
      <span class="rating">
        <img src="storage/img/estrellaRopa.png" alt="estrella">
        <span>5.0</span>
      </span>
    </div>
  </div>

  <div class="product img2">
    <div class="product-image">
      <a href="views/detail.html">
        <img src="storage/img/Library=Product2.png" alt="Ropa2">
      </a>
      <span class="fav active">
        <img src="storage/img/heartFAVORITO.png" alt="favorito activo">
      </span>
    </div>

    <h3>Light Dress Bless</h3>
    <p class="category">Dress modern</p>

    <div class="product-bottom">
      <span class="price">$162.99</span>
      <span class="rating">
        <img src="storage/img/estrellaRopa.png" alt="estrella">
        <span>5.0</span>
      </span>
    </div>
  </div>

  <div class="product img3">
    <div class="product-image">
      <a href="views/detail.html">
        <img src="storage/img/Library=Product3.png" alt="Ropa3">
      </a>
      <span class="fav">
        <img src="storage/img/heart.png" alt="favorito">
      </span>
    </div>

    <h3>Urban Hat Style</h3>
    <p class="category">Accessories</p>

    <div class="product-bottom">
      <span class="price">$120.99</span>
      <span class="rating">
        <img src="storage/img/estrellaRopa.png" alt="estrella">
        <span>5.0</span>
      </span>
    </div>
  </div>

  <div class="product img4">
    <div class="product-image">
      <a href="views/detail.html">
        <img src="storage/img/Library=Product4.png" alt="Ropa4">
      </a>
      <span class="fav">
        <img src="storage/img/heart.png" alt="favorito">
      </span>
    </div>

    <h3>Woman Casual Look</h3>
    <p class="category">Fashion</p>

    <div class="product-bottom">
      <span class="price">$140.99</span>
      <span class="rating">
        <img src="storage/img/estrellaRopa.png" alt="estrella">
        <span>5.0</span>
      </span>
    </div>
  </div>

</section>

<nav class="mobile-nav">
  <a href="#" class="nav-home">
    <img src="storage/img/CasaIcon.png" alt="inicio">
  </a>

  <a href="#" class="nav-bag active">
    <img src="storage/img/BolsoIcon.png" alt="bolso">
  </a>

  <a href="#" class="nav-heart">
    <img src="storage/img/HeartIcon.png" alt="favoritos">
  </a>

  <a href="views/profile.html" class="nav-user">
    <img src="storage/img/CuentaIcon.png" alt="cuenta">
  </a>
</nav>

</div>

</body>
</html>
